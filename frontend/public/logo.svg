<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0A2472"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#CFE2FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000050"/>
    </filter>
    <clipPath id="ballClip">
      <circle cx="120" cy="95" r="46"/>
    </clipPath>
  </defs>

  <!-- Badge outer ring -->
  <circle cx="120" cy="120" r="116" fill="#FFD700"/>
  <!-- Badge background -->
  <circle cx="120" cy="120" r="110" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Soccer ball body -->
  <circle cx="120" cy="95" r="46" fill="url(#ballGrad)" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Soccer ball pentagon pattern -->
  <!-- Center pentagon -->
  <polygon points="120,72 137,85 130,105 110,105 103,85" fill="#1a1a2e" clip-path="url(#ballClip)"/>
  <!-- Top-left pentagon -->
  <polygon points="103,85 90,76 88,58 104,52 115,62" fill="#1a1a2e" opacity="0.75" clip-path="url(#ballClip)"/>
  <!-- Top-right pentagon -->
  <polygon points="137,85 150,76 152,58 136,52 125,62" fill="#1a1a2e" opacity="0.75" clip-path="url(#ballClip)"/>
  <!-- Bottom-left pentagon -->
  <polygon points="110,105 96,112 86,100 88,84 103,85" fill="#1a1a2e" opacity="0.75" clip-path="url(#ballClip)"/>
  <!-- Bottom-right pentagon -->
  <polygon points="130,105 144,112 154,100 152,84 137,85" fill="#1a1a2e" opacity="0.75" clip-path="url(#ballClip)"/>
  <!-- Bottom pentagon -->
  <polygon points="110,105 130,105 138,120 120,130 102,120" fill="#1a1a2e" opacity="0.75" clip-path="url(#ballClip)"/>

  <!-- Ball shine -->
  <ellipse cx="108" cy="80" rx="10" ry="7" fill="white" opacity="0.4" transform="rotate(-30 108 80)"/>

  <!-- Gold divider line -->
  <rect x="25" y="154" width="190" height="3" fill="#FFD700" rx="1.5"/>

  <!-- LAMINY main text -->
  <text x="120" y="188" text-anchor="middle"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-weight="900" font-size="36" fill="white" letter-spacing="3">LAMINY</text>

  <!-- World Cup subtitle -->
  <text x="120" y="207" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="500" font-size="11"
        fill="#FFD700" letter-spacing="4">WORLD CUP 2026</text>
</svg>
